  A browser-based .level.bin object viewer with drag-and-drop support.
-->

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SLDL Objects Viewer</title>
  <link rel="icon" href="./favicon.ico">
  <link rel="stylesheet" href="css/viewer.css">

  <!-- SLDL runtime libraries from CDN -->
  <script src="https://www.unpkg.com/sldl-headers@0.33.7/dist/sldl-headers.min.js"></script>
  <script src="https://www.unpkg.com/sldl-utils@1.1.5/dist/sldl-utils.min.js"></script>
  <script src="https://www.unpkg.com/sldl-objects@1.2.6/dist/sldl-objects.min.js"></script>
  <script src="https://www.unpkg.com/sldl-jsonify@1.1.0/dist/sldl-jsonify.min.js"></script>
</head>

<body>

  <!-- Hidden file input for click-to-open -->
  <input type="file" id="file-input" accept=".bin" style="display: none;">

  <!-- Drop overlay (shown during drag) -->
  <div id="drop-overlay">
    <div id="drop-overlay-content">
      <div id="drop-icon">&#128229;</div>
      <div id="drop-text">Drop .level.bin file here</div>
    </div>
  </div>

  <!-- Header bar -->
  <div id="viewer-header">
    <div id="header-left">
      <span id="header-title">SLDL Objects Viewer</span>
      <span id="header-version">v0.33.7</span>
    </div>
    <div id="header-right">
      <span id="file-info">No file loaded.</span>
    </div>
  </div>

  <!-- Mode selector bar -->
  <div id="mode-bar">
    <div id="mode-left">
      <span id="mode-label">Declaration mode:</span>
      <label class="mode-option">
        <input type="radio" name="decl-mode" value="headers" checked>
        <span>Standard headers</span>
      </label>
      <label class="mode-option">
        <input type="radio" name="decl-mode" value="auto">
        <span>Auto-discovery</span>
      </label>
    </div>
    <div id="mode-right">
      <button id="btn-load-sample">Load Sample</button>
      <button id="btn-open-file">Open File</button>
    </div>
  </div>

  <!-- Main content area -->
  <div id="main-area">
    <!-- Left panel: object tree -->
    <div id="tree-panel">
      <div id="tree-panel-header">
        <span>Objects</span>
        <span id="tree-count"></span>
      </div>
      <div id="tree-content">
        <div id="tree-empty">Drop a .level.bin file or click "Load Sample" to begin.</div>
      </div>
      <!-- Declaration summary (below tree) -->
      <div id="decl-section">
        <div id="decl-header">
          <span id="decl-arrow">&#9654;</span>
          <span>Declarations</span>
          <span id="decl-count"></span>
        </div>
        <div id="decl-content" style="display: none;"></div>
      </div>
    </div>

    <!-- Right panel: detail view -->
    <div id="detail-panel">
      <div id="detail-header">
        <span id="detail-object-name"></span>
        <span id="detail-object-type"></span>
      </div>
      <!-- Tab bar -->
      <div id="tab-bar">
        <button class="tab-btn active" data-tab="properties">Properties</button>
        <button class="tab-btn" data-tab="json">Raw JSON</button>
      </div>
      <!-- Properties table -->
      <div id="tab-properties" class="tab-content active">
        <div id="prop-table-wrap">
          <table id="prop-table">
            <thead>
              <tr>
                <th class="col-name">Property</th>
                <th class="col-type">Type</th>
                <th class="col-value">Value</th>
              </tr>
            </thead>
            <tbody id="prop-tbody"></tbody>
          </table>
        </div>
      </div>
      <!-- Raw JSON view -->
      <div id="tab-json" class="tab-content">
        <pre id="json-view"></pre>
      </div>
    </div>
  </div>

  <!-- Status bar -->
  <div id="status-bar">
    <span id="status-text">Ready. Drag and drop a .level.bin file, or click "Load Sample".</span>
  </div>

  <!-- Viewer application script -->
  <script src="js/viewer.js"></script>
  <script>
    // Initialise the viewer after the page loads.
    window.addEventListener('DOMContentLoaded', function () {
      var viewer = new ObjectsViewer();
      viewer.init();
    });
  </script>

</body>
